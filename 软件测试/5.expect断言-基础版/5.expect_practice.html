<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3.2 expect 断言实战练习页面</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .hidden { display: none; }
        .loading-spinner { 
            width: 30px; height: 30px; border: 4px solid #f3f3f3; 
            border-top: 4px solid #3498db; border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 10px 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .active { background-color: #2ecc71; color: white; border: none; padding: 10px; cursor: pointer; }
        /* 场景 4: 骨架屏 */
        .skeleton { background-color: #e0e0e0 !important; color: transparent !important; cursor: wait; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>

    <h1>3.2 expect 断言实战练习页面</h1>

    <!-- 基础实战：登录状态校验 (实战1) -->
    <div class="section">
        <h2>1. 登录场景模拟</h2>
        <div id="login-form">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="admin">
            <button id="login-btn" onclick="login()">登录</button>
        </div>
        <div id="dashboard" class="hidden">
            <p id="user-name">欢迎回来，测试员</p>
        </div>
    </div>

    <!-- 综合实战：Enabled 检查 (实战2) -->
    <div class="section">
        <h2>2. 被禁用的提交 (Enabled)</h2>
        <label><input type="checkbox" id="agree-check" onchange="toggleReg()"> 我已阅读并同意协议</label><br><br>
        <button id="reg-btn" disabled onclick="alert('注册成功！')">注册</button>
    </div>

    <!-- 综合实战：异步属性与消失等待 (实战3) -->
    <div class="section">
        <h2>3. 异步报告生成</h2>
        <button id="report-btn" onclick="generateReport()">生成报告</button>
        <div id="spinner-container"></div>
    </div>

    <!-- 综合实战 2：骨架屏逻辑 (实战4) -->
    <div class="section">
        <h2>4. 骨架屏欺骗 (Skeleton Screen)</h2>
        <p>按钮初始为灰色骨架状态，5秒后注入文字和数据 ID。</p>
        <button id="buy-btn" class="skeleton">加载中...</button>
    </div>

    <!-- 进阶实战：表单字段批量检查 (实战5) -->
    <div class="section">
        <h2>5. 个人中心信息</h2>
        <div id="profile">
            <p>用户名: <span id="p-username">张三</span></p>
            <p>手机号: <span id="p-phone">13800138000</span></p>
            <p>邮箱: <span id="p-email">test@example.com</span></p>
            <p>等级: <span id="p-level">V5</span></p>
            <p>积分: <span id="p-points">100</span></p>
        </div>
    </div>

    <script>
        function login() {
            // 模拟跳转 URL 变化（实际不刷新页面）
            history.pushState({}, '', '/dashboard');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function generateReport() {
            const btn = document.getElementById('report-btn');
            const container = document.getElementById('spinner-container');
            
            // 显示加载器
            container.innerHTML = '<div class="loading-spinner"></div>';
            
            setTimeout(() => {
                // 加载器消失
                container.innerHTML = '';
                // 按钮状态变化
                btn.innerText = '下载报告';
                btn.classList.add('active');
            }, 3000);
        }

        // 场景 4 逻辑
        setTimeout(() => {
            const btn = document.getElementById('buy-btn');
            if (btn) {
                btn.classList.remove('skeleton');
                btn.innerText = '立即购买';
                btn.setAttribute('data-id', 'ITEM_999');
            }
        }, 5000);

        function checkBuy(btn) {
            const id = btn.getAttribute('data-id');
            if(!id) {
                alert("错误：点击太快！业务 ID 尚未注入，点击无效！");
            } else {
                alert("购买成功！商品 ID: " + id);
            }
        }

        // 场景 5 逻辑
        function toggleReg() {
            document.getElementById('reg-btn').disabled = !document.getElementById('agree-check').checked;
        }
    </script>
</body>
</html>
